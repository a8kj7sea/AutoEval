<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <h1>AutoEval</h1>
        <div class="separator"></div>

        <div class="control-group">
            <div class="control-item">
                <label for="modeSelect">Evaluation Mode</label>
                <div class="select-wrapper">
                    <select id="modeSelect">
                        <option value="Good">Strongly Agree</option>
                        <option value="Bad">Strongly Disagree</option>
                        <option value="Random">Random Mix</option>
                    </select>
                </div>
            </div>

            <div class="control-item">
                <label for="delayInput">Delay (Seconds)</label>
                <input type="number" id="delayInput" value="1.5" step="0.5" min="0.5" max="10">
            </div>

            <div class="control-item-inline">
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="noiseCheck" checked>
                    <span>Human Variance</span>
                </label>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-start" id="btnStart">Start Process</button>
            <button class="btn btn-stop" id="btnStop">Halt</button>
        </div>

        <div class="status stopped" id="statusText">
            <span class="status-indicator"></span>
            Status: Idle
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
